version: '3.8'

services:
  # Hardhat Blockchain Node - from Docker Hub
  blockchain:
    image: punithns/smart-collateral-blockchain:latest
    container_name: smart-collateral-blockchain
    ports:
      - "8545:8545"
    networks:
      - smart-collateral-network
    volumes:
      - blockchain-data:/app/data
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8545"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Next.js Frontend - from Docker Hub
  frontend:
    image: punithns/smart-collateral-frontend:latest
    container_name: smart-collateral-frontend
    ports:
      - "3000:3000"
    networks:
      - smart-collateral-network
    environment:
      - NEXT_PUBLIC_CHAIN_ID=31337
      - NEXT_PUBLIC_RPC_URL=http://blockchain:8545
    depends_on:
      blockchain:
        condition: service_healthy
    restart: unless-stopped

networks:
  smart-collateral-network:
    driver: bridge

volumes:
  blockchain-data:
